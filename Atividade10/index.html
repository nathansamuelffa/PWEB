<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cálculo de IMC</title>
</head>
<body>
    <h2>Calculadora de IMC</h2>

    <script src="script.js"></script>
</body>
