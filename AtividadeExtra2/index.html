<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Extra - Cálculo de Média</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; padding: 20px; }
        .box { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin: 0 auto; }
        h2, h3 { text-align: center; color: #333; }
        .contador { text-align: center; font-weight: bold; color: #007bff; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f1f1f1; }
        .resultado-geral { margin-top: 20px; padding: 15px; background-color: #d4edda; color: #155724; border-radius: 4px; font-size: 18px; text-align: center; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>Cadastro de Alunos e Notas</h2>
    <div class="contador" id="contadorTxt">Inserindo dados do Aluno 1 de 10</div>
    
    <form id="formAluno" onsubmit="adicionarAluno(event)">
        <div class="form-group">
            <label for="nome">Nome Completo (Nome e pelo menos 1 sobrenome):</label>
            <input type="text" id="nome" required>
        </div>
        <div class="form-group">
            <label for="ra">RA (Exatamente 5 dígitos numéricos):</label>
            <input type="text" id="ra" required maxlength="5">
        </div>
        <div class="form-group">
            <label for="nota1">Nota 1 (0 a 10):</label>
            <input type="number" id="nota1" step="0.1" min="0" max="10" required>
        </div>
        <div class="form-group">
            <label for="nota2">Nota 2 (0 a 10):</label>
            <input type="number" id="nota2" step="0.1" min="0" max="10" required>
        </div>
        <div class="form-group">
            <label for="nota3">Nota 3 (0 a 10):</label>
            <input type="number" id="nota3" step="0.1" min="0" max="10" required>
        </div>
        <button type="submit" id="btnEnviar">Gravar Aluno</button>
    </form>

    <h3>Histórico de Entradas</h3>
    <table id="tabelaAlunos">
        <thead>
            <tr>
                <th>Nome</th>
                <th>RA</th>
                <th>Média</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="resultado-geral" id="resultadoGeral"></div>
</div>

<script>
    let totalAlunos = 10;
    let alunosInseridos = 0;
    let somaMediasGerais = 0;

    function adicionarAluno(event) {
        event.preventDefault(); // Impede o recarregamento da página

        if (alunosInseridos >= totalAlunos) return;

        const nomeInput = document.getElementById("nome").value.trim();
        const raInput = document.getElementById("ra").value.trim();
        const n1 = parseFloat(document.getElementById("nota1").value);
        const n2 = parseFloat(document.getElementById("nota2").value);
        const n3 = parseFloat(document.getElementById("nota3").value);

        // 1. Validação do Nome (Pelo menos um espaço separando Nome de Sobrenome)
        const regexNome = /^[A-Za-zÀ-ÖØ-öø-ÿ]+(\s+[A-Za-zÀ-ÖØ-öø-ÿ]+)+$/;
        if (!regexNome.test(nomeInput)) {
            alert("Por favor, digite o nome completo (Nome e pelo menos um Sobrenome).");
            return;
        }

        // 2. Validação do RA (Apenas números e exatamente 5 dígitos)
        const regexRa = /^\d{5}$/;
        if (!regexRa.test(raInput)) {
            alert("O RA deve conter exatamente 5 números.");
            return;
        }

        // 3. Validação das Notas (0 a 10)
        if (isNaN(n1) || n1 < 0 || n1 > 10 || isNaN(n2) || n2 < 0 || n2 > 10 || isNaN(n3) || n3 < 0 || n3 > 10) {
            alert("As notas devem estar obrigatoriamente entre 0 e 10.");
            return;
        }

        // Cálculo da Média Individual
        const mediaIndividual = (n1 + n2 + n3) / 3;
        somaMediasGerais += mediaIndividual;
        alunosInseridos++;

        // Renderização do resultado na parte inferior da tela (Tabela)
        const tabelaCorpo = document.querySelector("#tabelaAlunos tbody");
        const novaLinha = document.createElement("tr");
        
        novaLinha.innerHTML = `
            <td>${nomeInput}</td>
            <td>${raInput}</td>
            <td>${mediaIndividual.toFixed(2)}</td>
        `;
        tabelaCorpo.appendChild(novaLinha);

        // Resetar campos do formulário para o próximo aluno
        document.getElementById("formAluno").reset();

        // Atualização ou Finalização da sequência
        if (alunosInseridos < totalAlunos) {
            document.getElementById("contadorTxt").innerText = `Inserindo dados do Aluno ${alunosInseridos + 1} de 10`;
        } else {
            document.getElementById("contadorTxt").innerText = "Todos os 10 alunos foram computados!";
            document.getElementById("btnEnviar").disabled = true;
            document.getElementById("btnEnviar").style.backgroundColor = "#ccc";
            document.getElementById("btnEnviar").innerText = "Processamento Concluído";
            
            // Cálculo da média geral coletiva
            const mediaGeralTurma = somaMediasGerais / totalAlunos;
            const divResultado = document.getElementById("resultadoGeral");
            divResultado.innerText = `MÉDIA GERAL DA TURMA: ${mediaGeralTurma.toFixed(2)}`;
            divResultado.style.display = "block";
        }
    }
</script>

</body>
</html>
